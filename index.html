<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>حاسبة المعدل - التعليم المتوسط</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue:        #1d4ed8;
      --blue-mid:    #3b82f6;
      --blue-light:  #dbeafe;
      --sky:         #0ea5e9;
      --green:       #16a34a;
      --green-light: #dcfce7;
      --red:         #dc2626;
      --red-light:   #fee2e2;
      --purple:      #7c3aed;
      --purple-light:#ede9fe;
      --amber:       #b45309;
      --amber-light: #fef3c7;
      --teal:        #0d9488;
      --teal-light:  #ccfbf1;
      --bg:          #eef5ff;
      --card:        #ffffff;
      --border:      #bfdbfe;
      --text:        #1e293b;
      --muted:       #64748b;
      --radius:      14px;
      --shadow:      0 4px 24px rgba(29,78,216,.10);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Tajawal',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding-bottom:60px;
    }

    /* ══════════════════════════════
       HEADER
    ══════════════════════════════ */
    header{
      background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 55%,#0ea5e9 100%);
      color:#fff;text-align:center;
      padding:32px 20px 22px;
      position:relative;overflow:hidden;
    }
    header::before{
      content:'';position:absolute;inset:0;
      background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
    }
    header .emoji{font-size:2.6rem;display:block;margin-bottom:6px;}
    header h1{font-size:1.6rem;font-weight:900;}
    header p {font-size:.85rem;opacity:.82;margin-top:4px;}

    /* ══════════════════════════════
       CONTAINER
    ══════════════════════════════ */
    .container{max-width:900px;margin:0 auto;padding:0 14px;}

    /* ══════════════════════════════
       YEAR CARD
    ══════════════════════════════ */
    .year-card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      border:1.5px solid var(--border);
      padding:20px 20px 18px;
      margin-top:-18px;position:relative;z-index:2;
    }
    .year-card > label{
      display:block;font-size:.92rem;font-weight:700;
      color:var(--blue);margin-bottom:10px;
    }
    .year-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
    .year-btn{
      border:2px solid var(--border);background:#f8faff;color:var(--muted);
      font-family:'Tajawal',sans-serif;font-size:.86rem;font-weight:700;
      border-radius:10px;padding:10px 4px;cursor:pointer;
      transition:all .2s;text-align:center;line-height:1.3;
    }
    .year-btn:hover{border-color:var(--blue-mid);color:var(--blue);background:var(--blue-light);}
    .year-btn.active{
      background:linear-gradient(135deg,#1d4ed8,#0ea5e9);
      color:#fff;border-color:transparent;
      box-shadow:0 4px 14px rgba(29,78,216,.35);
      transform:translateY(-2px);
    }
    .year-btn span{display:block;font-size:.7rem;font-weight:500;opacity:.85;margin-top:2px;}

    /* formula */
    .formula-box{
      margin-top:14px;border-radius:10px;
      overflow:hidden;border:1.5px solid var(--border);
    }
    .formula-box .f-title{
      background:linear-gradient(90deg,#1e3a8a,#1d4ed8);
      color:#fff;font-size:.8rem;font-weight:700;
      padding:7px 14px;
    }
    .formula-steps{
      background:#f8faff;
      display:flex;align-items:center;flex-wrap:wrap;
      gap:5px;padding:9px 14px;
    }
    .fs{
      border-radius:7px;padding:4px 10px;
      font-size:.78rem;font-weight:700;white-space:nowrap;
    }
    .fs.purple{background:var(--purple-light);color:var(--purple);}
    .fs.amber {background:var(--amber-light);color:var(--amber);}
    .fs.teal  {background:var(--teal-light);color:var(--teal);}
    .fs.blue  {background:var(--blue-light);color:var(--blue);}
    .fs.green {background:var(--green-light);color:var(--green);}
    .arrow{color:var(--muted);font-size:.95rem;}

    /* ══════════════════════════════
       SUBJECTS WRAPPER
    ══════════════════════════════ */
    .subjects-card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      border:1.5px solid var(--border);
      margin-top:16px;overflow:hidden;
      animation:fadeSlide .35s ease;
    }
    @keyframes fadeSlide{
      from{opacity:0;transform:translateY(14px);}
      to  {opacity:1;transform:translateY(0);}
    }
    .card-head{
      background:linear-gradient(90deg,#1e3a8a,#0ea5e9);
      color:#fff;padding:12px 18px;
      display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;
    }
    .card-head h2{font-size:.98rem;font-weight:800;}
    .card-head .badge{
      background:rgba(255,255,255,.2);border-radius:20px;
      padding:3px 12px;font-size:.76rem;
    }

    /* ══════════════════════════════
       PC TABLE  (≥ 700px)
    ══════════════════════════════ */
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;min-width:600px;}
    thead tr{background:#f0f5ff;}
    thead th{
      padding:9px 8px;font-size:.74rem;font-weight:700;
      color:#334155;text-align:center;
      border-bottom:2px solid var(--border);white-space:nowrap;
    }
    thead th.th-subject{text-align:right;min-width:145px;}
    .th-tq {color:var(--purple)!important;}
    .th-fr {color:var(--amber)!important;}
    .th-mc {color:var(--teal)!important;}
    .th-ex {color:#0284c7!important;}
    .th-moy{color:var(--green)!important;}
    .sub-head{display:block;font-size:.64rem;font-weight:500;opacity:.72;margin-top:1px;}

    tbody tr{border-bottom:1px solid #e9f0fd;transition:background .15s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:#f5f9ff;}
    td{padding:7px 8px;font-size:.86rem;vertical-align:middle;}
    td.subject-name{font-weight:600;}
    td.coeff-td{text-align:center;}
    td.coeff-td span{
      display:inline-block;background:var(--blue-light);
      color:var(--blue);border-radius:20px;
      padding:2px 9px;font-size:.74rem;font-weight:700;
    }
    td.inp-td,td.res-td{text-align:center;}

    /* computed badge */
    .cv{
      display:inline-block;min-width:50px;
      border-radius:8px;padding:3px 7px;
      font-size:.84rem;font-weight:800;border:1.5px solid;
    }
    .cv-n{background:#f1f5f9;color:var(--muted);border-color:#e2e8f0;}
    .cv-ok {background:var(--green-light);color:var(--green);border-color:#86efac;}
    .cv-bad{background:var(--red-light);color:var(--red);border-color:#fca5a5;}
    .cv-p  {background:var(--amber-light);color:var(--amber);border-color:#fcd34d;}

    /* inputs */
    input[type="number"]{
      width:64px;padding:6px 4px;
      font-family:'Tajawal',sans-serif;
      font-size:.88rem;font-weight:600;
      border:2px solid var(--border);
      border-radius:8px;text-align:center;
      color:var(--text);background:#f8faff;
      outline:none;
      transition:border-color .2s,box-shadow .2s;
      -moz-appearance:textfield;
    }
    input[type="number"]:focus{background:#fff;}
    input[type="number"].invalid{border-color:var(--red)!important;background:#fff5f5;}
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;}
    .inp-tq:focus{border-color:var(--purple)!important;box-shadow:0 0 0 3px rgba(124,58,237,.12)!important;}
    .inp-fr:focus{border-color:var(--amber)!important; box-shadow:0 0 0 3px rgba(180,83,9,.12)!important;}
    .inp-ex:focus{border-color:#0284c7!important;       box-shadow:0 0 0 3px rgba(2,132,199,.12)!important;}

    /* ══════════════════════════════
       MOBILE CARDS  (< 700px)
    ══════════════════════════════ */
    .mobile-list{display:none;padding:10px 12px;gap:10px;flex-direction:column;}

    .m-card{
      border:1.5px solid var(--border);
      border-radius:12px;background:#fff;
      overflow:hidden;
      transition:box-shadow .2s;
    }
    .m-card:focus-within{box-shadow:0 0 0 3px rgba(29,78,216,.13);}

    .m-card-head{
      background:linear-gradient(90deg,#eef3ff,#f0f7ff);
      padding:10px 14px;
      display:flex;justify-content:space-between;align-items:center;
    }
    .m-card-head .m-name{font-size:.92rem;font-weight:700;color:var(--text);}
    .m-card-head .m-coeff{
      background:var(--blue-light);color:var(--blue);
      border-radius:20px;padding:2px 10px;
      font-size:.74rem;font-weight:700;white-space:nowrap;
    }

    .m-card-body{padding:10px 14px 12px;}

    .m-inputs{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;margin-bottom:10px;
    }
    .m-inp-group{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .m-inp-group label{
      font-size:.68rem;font-weight:700;
      text-align:center;line-height:1.2;
    }
    .m-inp-group label.lbl-tq{color:var(--purple);}
    .m-inp-group label.lbl-fr{color:var(--amber);}
    .m-inp-group label.lbl-ex{color:#0284c7;}

    .m-inp-group input{
      width:100%;max-width:80px;
      padding:7px 4px;
      font-family:'Tajawal',sans-serif;
      font-size:.95rem;font-weight:700;
      border:2px solid var(--border);
      border-radius:8px;text-align:center;
      color:var(--text);background:#f8faff;
      outline:none;
      transition:border-color .2s,box-shadow .2s;
      -moz-appearance:textfield;
    }
    .m-inp-group input:focus{background:#fff;}
    .m-inp-group input.invalid{border-color:var(--red)!important;background:#fff5f5;}
    .m-inp-group input::-webkit-inner-spin-button,
    .m-inp-group input::-webkit-outer-spin-button{-webkit-appearance:none;}
    .m-inp-tq:focus{border-color:var(--purple)!important;box-shadow:0 0 0 3px rgba(124,58,237,.12)!important;}
    .m-inp-fr:focus{border-color:var(--amber)!important; box-shadow:0 0 0 3px rgba(180,83,9,.12)!important;}
    .m-inp-ex:focus{border-color:#0284c7!important;       box-shadow:0 0 0 3px rgba(2,132,199,.12)!important;}

    .m-results{
      display:grid;grid-template-columns:1fr 1fr;gap:8px;
      padding-top:8px;border-top:1px dashed #e0eaff;
    }
    .m-res-item{
      border-radius:8px;padding:6px 10px;text-align:center;
      border:1.5px solid;
    }
    .m-res-item .m-res-label{font-size:.66rem;font-weight:600;margin-bottom:2px;}
    .m-res-item .m-res-val  {font-size:1rem;font-weight:900;}

    .m-res-teal {background:var(--teal-light);border-color:#5eead4;}
    .m-res-teal .m-res-label{color:var(--teal);}
    .m-res-teal .m-res-val  {color:var(--teal);}

    .m-res-green{background:var(--green-light);border-color:#86efac;}
    .m-res-green .m-res-label{color:var(--green);}
    .m-res-green .m-res-val  {color:var(--green);}

    .m-res-red  {background:var(--red-light);border-color:#fca5a5;}
    .m-res-red  .m-res-label{color:var(--red);}
    .m-res-red  .m-res-val  {color:var(--red);}

    .m-res-neutral{background:#f1f5f9;border-color:#e2e8f0;}
    .m-res-neutral .m-res-label{color:var(--muted);}
    .m-res-neutral .m-res-val  {color:var(--muted);}

    .m-res-partial{background:var(--amber-light);border-color:#fcd34d;}
    .m-res-partial .m-res-label{color:var(--amber);}
    .m-res-partial .m-res-val  {color:var(--amber);}

    /* ══════════════════════════════
       ACTIONS
    ══════════════════════════════ */
    .actions{padding:14px 16px;display:flex;gap:10px;flex-wrap:wrap;}
    .btn-calc{
      flex:1;min-width:160px;
      background:linear-gradient(135deg,#1d4ed8,#0ea5e9);
      color:#fff;font-family:'Tajawal',sans-serif;
      font-size:1rem;font-weight:800;
      border:none;border-radius:10px;padding:13px;
      cursor:pointer;transition:all .2s;
      box-shadow:0 4px 14px rgba(29,78,216,.3);
    }
    .btn-calc:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(29,78,216,.4);}
    .btn-calc:active{transform:translateY(0);}
    .btn-reset{
      background:#f1f5f9;color:var(--muted);
      font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:700;
      border:2px solid #e2e8f0;border-radius:10px;
      padding:13px 18px;cursor:pointer;transition:all .2s;
    }
    .btn-reset:hover{background:#e2e8f0;color:var(--text);}

    /* error */
    .error-msg{
      color:var(--red);background:var(--red-light);
      border:1.5px solid #fca5a5;border-radius:8px;
      padding:10px 16px;font-size:.84rem;font-weight:600;
      margin:0 16px 12px;display:none;
    }

    /* ══════════════════════════════
       RESULT CARD
    ══════════════════════════════ */
    .result-card{
      border-radius:var(--radius);box-shadow:var(--shadow);
      margin-top:16px;padding:26px 22px;
      border:2.5px solid;
      animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
    .result-card.success{background:var(--green-light);border-color:#86efac;}
    .result-card.fail   {background:var(--red-light);  border-color:#fca5a5;}

    .result-top{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;}
    .r-icon{font-size:3rem;}
    .r-main{text-align:center;}
    .r-status{font-size:1.4rem;font-weight:900;}
    .result-card.success .r-status{color:var(--green);}
    .result-card.fail    .r-status{color:var(--red);}
    .r-moy{font-size:3.6rem;font-weight:900;line-height:1;}
    .result-card.success .r-moy{color:var(--green);}
    .result-card.fail    .r-moy{color:var(--red);}
    .r-outof{font-size:.82rem;color:var(--muted);}

    .r-details{
      display:flex;justify-content:center;gap:18px;
      margin-top:16px;padding-top:14px;
      border-top:1px solid rgba(0,0,0,.09);flex-wrap:wrap;
    }
    .r-d .dv{font-size:1.1rem;font-weight:800;color:var(--blue);text-align:center;}
    .r-d .dl{font-size:.72rem;color:var(--muted);margin-top:2px;text-align:center;}

    /* ══════════════════════════════
       RESPONSIVE BREAKPOINT
    ══════════════════════════════ */
    @media(max-width:699px){
      /* hide table, show cards */
      .table-wrap{display:none;}
      .mobile-list{display:flex;}

      header h1{font-size:1.25rem;}
      header .emoji{font-size:2rem;}
      .year-tabs{grid-template-columns:repeat(2,1fr);}
      .formula-steps{gap:4px;}
      .r-moy{font-size:2.8rem!important;}
    }
    @media(min-width:700px){
      /* hide cards, show table */
      .mobile-list{display:none!important;}
      .table-wrap{display:block;}
    }
  </style>
</head>
<body>

<header>
  <span class="emoji">🎓</span>
  <h1>حاسبة المعدل الفصلي</h1>
  <p>التعليم المتوسط — الجمهورية الجزائرية الديمقراطية الشعبية</p>
</header>

<div class="container">

  <!-- ── Year Selector ── -->

      <button class="year-btn" onclick="selectYear('3AM')">السنة الثالثة<span>3 AM</span></button>
      <button class="year-btn" onclick="selectYear('4AM')">السنة الرابعة<span>4 AM</span></button>
    </div>
    <div class="formula-box">
      <div class="f-title">📐 طريقة الحساب الرسمية</div>
      <div class="formula-steps">
        <span class="fs purple">تقييم /20</span>
        <span class="arrow">+</span>
        <span class="fs amber">فرض /20</span>
        <span class="arrow">÷ 2 =</span>
        <span class="fs teal">م. مراقبة /20</span>
        <span class="arrow">│</span>
        <span class="fs teal">م.مراقبة ×1</span>
        <span class="arrow">+</span>
        <span class="fs blue">اختبار ×3</span>
        <span class="arrow">÷ 4 =</span>
        <span class="fs green">معدل المادة /20</span>
      </div>
    </div>
  </div>

  <!-- ── Subjects Section ── -->
  <div id="subjects-section"></div>

  <!-- ── Result ── -->
  <div id="result-section"></div>

</div>

      {name:'اللغة الفرنسية',                 coeff:3},
      {name:'اللغة الإنجليزية',               coeff:2},
      {name:'الرياضيات',                      coeff:4},
      {name:'علوم الطبيعة والحياة',           coeff:2},
      {name:'العلوم الفيزيائية والتكنولوجيا', coeff:2},
      {name:'التربية الإسلامية',              coeff:2},
      {name:'التاريخ والجغرافيا',             coeff:3},
      {name:'التربية المدنية',                coeff:1},
      {name:'التربية التشكيلية أو الموسيقى',  coeff:1},
      {name:'التربية البدنية والرياضية',      coeff:1},
      {name:'المعلوماتية',                    coeff:1},
    ]
  }
};

let currentYear = null;

/* ═══════════════════════════════════════
   SELECT YEAR
═══════════════════════════════════════ */
function selectYear(yr) {
  currentYear = yr;
  document.querySelectorAll('.year-btn').forEach((b, i) => {
    b.classList.toggle('active', Object.keys(YEARS)[i] === yr);
  });
  renderSubjects(yr);
  document.getElementById('result-section').innerHTML = '';
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function renderSubjects(yr) {
  const data = YEARS[yr];
  const totalCoeff = data.subjects.reduce((s, sub) => s + sub.coeff, 0);

  /* ── PC Table rows ── */
  const tableRows = data.subjects.map((sub, idx) => `
    <tr>
      <td class="subject-name">${sub.name}</td>
      <td class="coeff-td"><span>×${sub.coeff}</span></td>
      <td class="inp-td">
        <input type="number" id="tq-${idx}" class="inp-tq"
               min="0" max="20" step="0.25" placeholder="/20"
               oninput="onInput(${idx})"/>
      </td>
      <td class="inp-td">
        <input type="number" id="fr-${idx}" class="inp-fr"
               min="0" max="20" step="0.25" placeholder="/20"
               oninput="onInput(${idx})"/>
      </td>
      <td class="res-td"><span class="cv cv-n" id="mc-${idx}">—</span></td>
      <td class="inp-td">
        <input type="number" id="ex-${idx}" class="inp-ex"
               min="0" max="20" step="0.25" placeholder="/20"
               oninput="onInput(${idx})"/>
      </td>
      <td class="res-td"><span class="cv cv-n" id="mb-${idx}">—</span></td>
    </tr>
  `).join('');

  /* ── Mobile Cards ── */
  const mobileCards = data.subjects.map((sub, idx) => `
    <div class="m-card">
      <div class="m-card-head">
        <span class="m-name">${sub.name}</span>
        <span class="m-coeff">معامل ×${sub.coeff}</span>
      </div>
      <div class="m-card-body">
        <div class="m-inputs">
          <div class="m-inp-group">
            <label class="lbl-tq">التقييم<br>المستمر /20</label>
            <input type="number" id="mtq-${idx}" class="m-inp-tq"
                   min="0" max="20" step="0.25" placeholder="0-20"
                   oninput="onInput(${idx})"/>
          </div>
          <div class="m-inp-group">
            <label class="lbl-fr">الفرض<br>/20</label>
            <input type="number" id="mfr-${idx}" class="m-inp-fr"
                   min="0" max="20" step="0.25" placeholder="0-20"
                   oninput="onInput(${idx})"/>
          </div>
          <div class="m-inp-group">
            <label style="color:#0284c7">الاختبار<br>/20</label>
            <input type="number" id="mex-${idx}" class="m-inp-ex"
                   min="0" max="20" step="0.25" placeholder="0-20"
                   oninput="onInput(${idx})"/>
          </div>
        </div>
        <div class="m-results">
          <div class="m-res-item m-res-neutral" id="mmc-${idx}">
            <div class="m-res-label">م. المراقبة</div>
            <div class="m-res-val">—</div>
          </div>
          <div class="m-res-item m-res-neutral" id="mmb-${idx}">
            <div class="m-res-label">معدل المادة</div>
            <div class="m-res-val">—</div>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('subjects-section').innerHTML = `
    <div class="subjects-card">
      <div class="card-head">
        <h2>📚 ${data.label}</h2>
        <span class="badge">مجموع المعاملات: ${totalCoeff}</span>
      </div>

      <!-- PC TABLE -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="th-subject">المادة</th>
              <th>المعامل</th>
              <th class="th-tq">التقييم المستمر<span class="sub-head">/20</span></th>
              <th class="th-fr">الفرض<span class="sub-head">/20</span></th>
              <th class="th-mc">م. المراقبة<span class="sub-head">(تق+فرض)÷2</span></th>
              <th class="th-ex">الاختبار<span class="sub-head">/20</span></th>
              <th class="th-moy">معدل المادة<span class="sub-head">(م.م×1+اخت×3)÷4</span></th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>

      <!-- MOBILE CARDS -->
      <div class="mobile-list">${mobileCards}</div>

      <div class="error-msg" id="error-msg"></div>
      <div class="actions">
        <button class="btn-calc" onclick="calculate()">📊 حساب المعدل الفصلي</button>
        <button class="btn-reset" onclick="resetAll()">🔄 مسح الكل</button>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════
   HELPERS — get/set values across both views
═══════════════════════════════════════ */
function getVal(prefix, idx) {
  // try desktop first, fallback to mobile
  const desktop = document.getElementById(`${prefix}-${idx}`);
  const mobile  = document.getElementById(`m${prefix}-${idx}`);
  const el = (desktop && desktop.offsetParent !== null) ? desktop : mobile;
  if (!el || el.value === '') return NaN;
  return parseFloat(el.value);
}

function markInvalid(prefix, idx, bad) {
  const desktop = document.getElementById(`${prefix}-${idx}`);
  const mobile  = document.getElementById(`m${prefix}-${idx}`);
  [desktop, mobile].forEach(el => {
    if (el) el.classList.toggle('invalid', bad);
  });
}

/* ═══════════════════════════════════════
   LIVE UPDATE
═══════════════════════════════════════ */
function onInput(idx) {
  // sync desktop ↔ mobile
  syncInputs(idx);

  const tq = getVal('tq', idx);
  const fr = getVal('fr', idx);
  const ex = getVal('ex', idx);

  // validate
  [[tq,'tq'],[fr,'fr'],[ex,'ex']].forEach(([v, p]) => {
    const hasVal = !isNaN(v);
    markInvalid(p, idx, hasVal && (v < 0 || v > 20));
  });

  const okTQ = !isNaN(tq) && tq >= 0 && tq <= 20;
  const okFR = !isNaN(fr) && fr >= 0 && fr <= 20;
  const okEX = !isNaN(ex) && ex >= 0 && ex <= 20;

  // Moyenne de surveillance continue
  let mc = null;
  if (okTQ && okFR) mc = (tq + fr) / 2;

  // Moyenne de la matière
  let moy = null;
  if (mc !== null && okEX) moy = (mc + ex * 3) / 4;

  // Update desktop badges
  updateBadge(`mc-${idx}`, mc, okTQ || okFR, 'cv');
  updateBadge(`mb-${idx}`, moy, (mc !== null) || okEX, 'cv');

  // Update mobile result items
  updateMobileResult(`mmc-${idx}`, mc, okTQ || okFR);
  updateMobileResult(`mmb-${idx}`, moy, (mc !== null) || okEX);
}

function syncInputs(idx) {
  // When user types in desktop → copy to mobile and vice-versa
  ['tq','fr','ex'].forEach(p => {
    const d = document.getElementById(`${p}-${idx}`);
    const m = document.getElementById(`m${p}-${idx}`);
    if (!d || !m) return;
    if (document.activeElement === d) m.value = d.value;
    else if (document.activeElement === m) d.value = m.value;
  });
}

function updateBadge(id, val, partial, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  if (val !== null) {
    el.className = `${cls} ` + (val >= 10 ? 'cv-ok' : 'cv-bad');
    el.textContent = val.toFixed(2);
  } else if (partial) {
    el.className = `${cls} cv-p`;
    el.textContent = '...';
  } else {
    el.className = `${cls} cv-n`;
    el.textContent = '—';
  }
}

function updateMobileResult(id, val, partial) {
  const el = document.getElementById(id);
  if (!el) return;
  const valEl = el.querySelector('.m-res-val');
  if (val !== null) {
    el.className = 'm-res-item ' + (val >= 10 ? 'm-res-green' : 'm-res-red');
    valEl.textContent = val.toFixed(2);
  } else if (partial) {
    el.className = 'm-res-item m-res-partial';
    valEl.textContent = '...';
  } else {
    el.className = 'm-res-item m-res-neutral';
    valEl.textContent = '—';
  }
}

/* ═══════════════════════════════════════
   CALCULATE FINAL AVERAGE
═══════════════════════════════════════ */
function getSubjectMoy(idx) {
  const tq = getVal('tq', idx);
  const fr = getVal('fr', idx);
  const ex = getVal('ex', idx);

  const hasTQ = !isNaN(tq) && tq >= 0 && tq <= 20;
  const hasFR = !isNaN(fr) && fr >= 0 && fr <= 20;
  const hasEX = !isNaN(ex) && ex >= 0 && ex <= 20;

  if ((!isNaN(tq)&&(tq<0||tq>20)) || (!isNaN(fr)&&(fr<0||fr>20)) || (!isNaN(ex)&&(ex<0||ex>20)))
    return 'invalid';

  if (!hasTQ && !hasFR && !hasEX) return null;
  if (hasTQ && hasFR && hasEX) {
    const mc = (tq + fr) / 2;
    return (mc + ex * 3) / 4;
  }
  return 'incomplete';
}

function calculate() {
  if (!currentYear) return;
  const subs = YEARS[currentYear].subjects;
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  let sumW = 0, sumC = 0, skipped = 0, incomplete = 0, hasInvalid = false;

  subs.forEach((sub, idx) => {
    const moy = getSubjectMoy(idx);
    if (moy === 'invalid')    { hasInvalid = true; return; }
    if (moy === null)         { skipped++;  return; }
    if (moy === 'incomplete') { incomplete++; return; }
    sumW += moy * sub.coeff;
    sumC += sub.coeff;
  });

  if (hasInvalid) {
    errEl.style.display = 'block';
    errEl.textContent = '⚠️ توجد قيم غير صحيحة. تأكد أن جميع العلامات بين 0 و 20.';
    document.getElementById('result-section').innerHTML = '';
    return;
  }
  if (sumC === 0) {
    errEl.style.display = 'block';
    errEl.textContent = '⚠️ أدخل العلامات الثلاث (تقييم + فرض + اختبار) لمادة واحدة على الأقل.';
    document.getElementById('result-section').innerHTML = '';
    return;
  }

  const moyenne = sumW / sumC;
  const totalCoeff = subs.reduce((s, sub) => s + sub.coeff, 0);
  const usedSubjects = subs.length - skipped - incomplete;
  const success = moyenne >= 10;

  const mention = moyenne >= 16 ? '🌟 ممتاز'
                : moyenne >= 14 ? '👏 جيد جداً'
                : moyenne >= 12 ? '✔️ جيد'
                : moyenne >= 10 ? '✅ حسن'
                : moyenne >=  8 ? '⚠️ ضعيف'
                :                 '❌ ضعيف جداً';

  let notes = [];
  if (incomplete > 0) notes.push(`${incomplete} مادة غير مكتملة البيانات`);
  if (skipped    > 0) notes.push(`${skipped} مادة فارغة`);

  document.getElementById('result-section').innerHTML = `
    <div class="result-card ${success ? 'success' : 'fail'}">
      <div class="result-top">
        <span class="r-icon">${success ? '🏆' : '📖'}</span>
        <div class="r-main">
          <div class="r-status">${success ? 'ناجح ✅' : 'راسب ❌'}</div>
          <div class="r-moy">${moyenne.toFixed(2)}</div>
          <div class="r-outof">المعدل الفصلي / 20</div>
        </div>
      </div>
      <div class="r-details">
        <div class="r-d"><div class="dv">${sumC} / ${totalCoeff}</div><div class="dl">معاملات محسوبة</div></div>
        <div class="r-d"><div class="dv">${sumW.toFixed(2)}</div><div class="dl">مجـ(معدل×معامل)</div></div>
        <div class="r-d"><div class="dv">${usedSubjects} / ${subs.length}</div><div class="dl">مواد مكتملة</div></div>
        <div class="r-d"><div class="dv">${mention}</div><div class="dl">التقدير</div></div>
      </div>
      ${notes.length > 0 ? `<p style="margin-top:12px;text-align:center;font-size:.76rem;color:#64748b;">* ${notes.join(' — ')}</p>` : ''}
    </div>
  `;
  document.getElementById('result-section').scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* ═══════════════════════════════════════
   RESET
═══════════════════════════════════════ */
function resetAll() {
  if (!currentYear) return;
  YEARS[currentYear].subjects.forEach((_, idx) => {
    ['tq','fr','ex'].forEach(p => {
      ['', 'm'].forEach(pre => {
        const el = document.getElementById(`${pre}${p}-${idx}`);
        if (el) { el.value = ''; el.classList.remove('invalid'); }
      });
    });
    updateBadge(`mc-${idx}`, null, false, 'cv');
    updateBadge(`mb-${idx}`, null, false, 'cv');
    updateMobileResult(`mmc-${idx}`, null, false);
    updateMobileResult(`mmb-${idx}`, null, false);
  });
  const errEl = document.getElementById('error-msg');
  if (errEl) errEl.style.display = 'none';
  document.getElementById('result-section').innerHTML = '';
}

// Boot
selectYear('1AM');
</script>
